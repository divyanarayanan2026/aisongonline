<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon: rounded square with gradient + waveform bars -->
  <rect x="0" y="4" width="40" height="40" rx="11" fill="url(#iconGrad)" filter="url(#glow)"/>

  <!-- Waveform bars inside icon -->
  <rect x="8"  y="22" width="4" height="10" rx="2" fill="white" opacity="0.9"/>
  <rect x="14" y="16" width="4" height="16" rx="2" fill="white" opacity="0.9"/>
  <rect x="20" y="19" width="4" height="13" rx="2" fill="white" opacity="0.9"/>
  <rect x="26" y="14" width="4" height="20" rx="2" fill="white" opacity="0.9"/>

  <!-- Music note dot on top bar -->
  <circle cx="28" cy="13" r="2.5" fill="white" opacity="0.7"/>

  <!-- Text: "AISong" bold white -->
  <text x="50" y="26"
    font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
    font-weight="800"
    font-size="20"
    letter-spacing="-0.5"
    fill="#f1f0ff">AISong</text>

  <!-- Text: "Online" gradient cyan-violet -->
  <text x="51" y="40"
    font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
    font-weight="600"
    font-size="11"
    letter-spacing="2"
    fill="url(#textGrad)">ONLINE</text>
</svg>
